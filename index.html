<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>30th Birthday Party</title>
        <style>
            body {
                margin: 0;
                font-family: 'Poppins', sans-serif;
                background: pink;
                text-align: center;
                padding: 60px 20px;
            }
            
            .card {
                background: white;
                padding: 30px;
                border: 15px;
                width: 100%;
                text-align: center;
                box-shadow: 0 10px 25px;
            }
            
            h1 {
                margin: 0;
                font-size: 28px;
                color: green;
            }
            
            h2 {
                margin: 10px 0 20px;
                font-weight: 400;
                color: grey;
                font-style: italic;
            }
            
            .details {
                text-align:center;
                margin-bottom: 20px;
                border: 5px dotted pink;
                padding:6px;
            }
            
            .details p {
                margin: 10px;
                font-weight: bold;
            }
            
            .highlight {
                font-weight: 500;
                color: #ff5e62;
            }
            
            .footer {
                font-family: cursive, sans-serif;
                font-weight: bold;
                color:green;
            }
        </style>
    </head>
    <body>
        
    <div class="card">
        <h1>30th Birthday Bash</h1>
        <h2>You're invited!</h2>
        
        <div class="details">
            <p><span class="highlight"> Date:</span> April 1, 2026</p>
            <p><span class="highlight">Time:</span> 7:00 PM </p>
            <p><span class="highlight">Location:</span> Brussel, Belgium</p>
            <p><span class="highlight">Theme:</span> Dress to impress </p>
        </div>
        
        <div class="footer">
            <em>Can't wait to celebrate with you!</em>
        </div>
    </div>
        
    </body>
</html>
